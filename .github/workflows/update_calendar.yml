name: Update Jordan On-Call Calendar

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC = calendar refresh
    - cron: '0 11 * * *'  # 11 AM UTC = 7 AM Eastern (EST) / adjust for EDT below
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run calendar generator
        run: python generate.py

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Commit updated ICS to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jordan_oncall.ics docs/.nojekyll
          git diff --cached --quiet || git commit -m "Update Jordan on-call calendar [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send on-call text reminder
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
        run: |
          python - <<'EOF'
          import urllib.request, urllib.parse, os
          from datetime import date

          today = date.today().strftime("%Y%m%d")

          with open("docs/jordan_oncall.ics") as f:
              content = f.read()

          # Check if today appears as an on-call date
          if f"DTSTART;VALUE=DATE:{today}" in content:
              sid   = os.environ["TWILIO_ACCOUNT_SID"]
              token = os.environ["TWILIO_AUTH_TOKEN"]
              frm   = os.environ["TWILIO_FROM"]
              to    = os.environ["TWILIO_TO"]

              data = urllib.parse.urlencode({
                  "From": frm,
                  "To": to,
                  "Body": "Reminder: You are on call today!"
              }).encode()

              req = urllib.request.Request(
                  f"https://api.twilio.com/2010-04-01/Accounts/{sid}/Messages.json",
                  data=data,
                  headers={"Content-Type": "application/x-www-form-urlencoded"}
              )
              import base64
              creds = base64.b64encode(f"{sid}:{token}".encode()).decode()
              req.add_header("Authorization", f"Basic {creds}")

              resp = urllib.request.urlopen(req)
              print("Text sent:", resp.status)
          else:
              print("Not on call today, no text sent.")
          EOF
