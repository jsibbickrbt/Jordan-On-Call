name: Update Jordan On-Call Calendar

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run calendar generator
        run: python generate.py

      - name: Ensure .nojekyll exists
        run: touch docs/.nojekyll

      - name: Commit updated ICS to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/jordan_oncall.ics docs/.nojekyll
          git diff --cached --quiet || git commit -m "Update Jordan on-call calendar [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
